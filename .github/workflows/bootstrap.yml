name: Bootstrap Terraform State

on:
  workflow_dispatch:
    inputs:
      state_bucket:
        description: 'S3 bucket name for Terraform state (must be globally unique).'
        required: true
        type: string
      lock_table:
        description: 'DynamoDB table name for state locking.'
        required: true
        default: 'terraform-state-locks'
        type: string
      aws_region:
        description: 'AWS region.'
        required: true
        default: 'ap-south-1'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Create S3 state bucket
        run: |
          BUCKET="${{ github.event.inputs.state_bucket }}"
          REGION="${{ github.event.inputs.aws_region }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists, skipping creation."
          else
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi

            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "S3 bucket $BUCKET created with versioning, encryption, and public access blocked."
          fi

      - name: Create DynamoDB lock table
        run: |
          TABLE="${{ github.event.inputs.lock_table }}"
          REGION="${{ github.event.inputs.aws_region }}"

          if aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" 2>/dev/null; then
            echo "Table $TABLE already exists, skipping creation."
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            echo "DynamoDB table $TABLE created."
          fi

      - name: Summary
        run: |
          echo "Bootstrap complete. Configure the following GitHub Secrets in this repository:"
          echo ""
          echo "  TF_STATE_BUCKET = ${{ github.event.inputs.state_bucket }}"
          echo "  TF_LOCK_TABLE   = ${{ github.event.inputs.lock_table }}"
          echo ""
          echo "Then push to 'develop' or run 'Deploy Dev' to apply the dev stack."
