name: Deploy Dev Database

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'terraform/modules/sqlserver/**'
      - 'terraform/environments/dev-database/**'
  workflow_dispatch:
    inputs:
      vpc_id:
        description: Optional VPC ID override for dev database deployment.
        required: false
        type: string
      private_subnet_ids:
        description: Optional subnet IDs override (JSON array or comma-separated list).
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply-dev-database:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
      DB_PROJECT_NAME: ${{ vars.DB_PROJECT_NAME }}
      DEV_DB_VPC_ID: ${{ github.event.inputs.vpc_id || vars.DEV_DB_VPC_ID || secrets.DEV_DB_VPC_ID }}
      DEV_DB_PRIVATE_SUBNET_IDS: ${{ github.event.inputs.private_subnet_ids || vars.DEV_DB_PRIVATE_SUBNET_IDS || secrets.DEV_DB_PRIVATE_SUBNET_IDS }}
      DEV_DB_ALLOWED_CIDRS: ${{ vars.DEV_DB_ALLOWED_CIDRS }}
      DEV_DB_USERNAME: ${{ vars.DEV_DB_USERNAME }}
      DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD || secrets.DB_PASSWORD || secrets.SQLSERVER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required database variables
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEV_DB_PASSWORD}" ]; then
            echo "Missing DB password secret. Set one of: DEV_DB_PASSWORD, DB_PASSWORD, SQLSERVER_PASSWORD"
            exit 1
          fi

      - name: Resolve database network settings
        id: resolve_network
        shell: bash
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: hospital-mgmt/dev/terraform.tfstate
        run: |
          set -euo pipefail

          VPC_ID="${DEV_DB_VPC_ID:-}"
          PRIVATE_SUBNET_IDS="${DEV_DB_PRIVATE_SUBNET_IDS:-}"

          if [ -z "$VPC_ID" ] || [ -z "$PRIVATE_SUBNET_IDS" ]; then
            echo "DEV_DB_VPC_ID / DEV_DB_PRIVATE_SUBNET_IDS not set. Resolving from terraform/environments/dev state."

            pushd terraform/environments/dev >/dev/null

            if [ -n "$TF_STATE_BUCKET" ] && [ -n "$TF_LOCK_TABLE" ]; then
              terraform init \
                -backend-config="bucket=$TF_STATE_BUCKET" \
                -backend-config="key=$TF_STATE_KEY" \
                -backend-config="region=${AWS_REGION}" \
                -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
                -backend-config="encrypt=true"
            else
              terraform init
            fi

            if [ -z "$VPC_ID" ]; then
              VPC_ID="$(terraform output -raw vpc_id)"
            fi

            if [ -z "$PRIVATE_SUBNET_IDS" ]; then
              PRIVATE_SUBNET_IDS="$(terraform output -json private_subnet_ids | tr -d '\r\n' | sed 's/[[:space:]]//g')"
            fi

            popd >/dev/null
          fi

          if [ -z "$VPC_ID" ] || [ -z "$PRIVATE_SUBNET_IDS" ]; then
            echo "State-based lookup incomplete. Trying AWS API fallback using dev VPC CIDR 10.20.0.0/16."

            if [ -z "$VPC_ID" ]; then
              VPC_ID="$(aws ec2 describe-vpcs --region "$AWS_REGION" --filters Name=cidr,Values=10.20.0.0/16 --query 'Vpcs[0].VpcId' --output text 2>/dev/null || true)"
              if [ "$VPC_ID" = "None" ]; then
                VPC_ID=""
              fi
            fi

            if [ -z "$VPC_ID" ]; then
              PROJECT_NAME="${DB_PROJECT_NAME:-hospital-mgmt}"
              VPC_ID="$(aws ec2 describe-vpcs --region "$AWS_REGION" --filters Name=tag:Name,Values="${PROJECT_NAME}-dev-vpc" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || true)"
              if [ "$VPC_ID" = "None" ]; then
                VPC_ID=""
              fi
            fi

            if [ -z "$PRIVATE_SUBNET_IDS" ] && [ -n "$VPC_ID" ]; then
              PRIVATE_SUBNET_IDS="$(aws ec2 describe-subnets --region "$AWS_REGION" --filters Name=vpc-id,Values="$VPC_ID" Name=tag:Name,Values='*private*' --query 'Subnets[].SubnetId' --output json 2>/dev/null | tr -d '\r\n' | sed 's/[[:space:]]//g')"

              if [ -z "$PRIVATE_SUBNET_IDS" ] || [ "$PRIVATE_SUBNET_IDS" = "[]" ]; then
                PRIVATE_SUBNET_IDS="$(aws ec2 describe-subnets --region "$AWS_REGION" --filters Name=vpc-id,Values="$VPC_ID" --query 'Subnets[].SubnetId' --output json 2>/dev/null | tr -d '\r\n' | sed 's/[[:space:]]//g')"
              fi
            fi
          fi

          if [ -z "$VPC_ID" ] || [ -z "$PRIVATE_SUBNET_IDS" ]; then
            echo "Unable to resolve dev database network settings. Provide workflow_dispatch inputs, set vars.DEV_DB_VPC_ID and vars.DEV_DB_PRIVATE_SUBNET_IDS, or deploy terraform/environments/dev first."
            exit 1
          fi

          {
            echo "vpc_id<<EOF"
            echo "$VPC_ID"
            echo "EOF"
            echo "private_subnet_ids<<EOF"
            echo "$PRIVATE_SUBNET_IDS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Terraform variable file
        shell: bash
        working-directory: terraform/environments/dev-database
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          def parse_json_list(raw_value: str, default_value):
              value = (raw_value or "").strip()
              if not value:
                  return default_value
              if value.startswith("["):
                  normalized = re.sub(r",\s*\]", "]", value, flags=re.S)
                  try:
                      parsed = json.loads(normalized)
                      if not isinstance(parsed, list):
                          raise ValueError(f"Expected JSON array, got: {value}")
                      return parsed
                  except json.JSONDecodeError:
                      pass
              cleaned = value.replace("[", "").replace("]", "")
              items = []
              for part in re.split(r"[\n,]", cleaned):
                  token = part.strip().strip('"').strip("'")
                  if token:
                      items.append(token)
              if items:
                  return items
              return [item.strip() for item in value.split(",") if item.strip()]

          def validate_db_password(raw_value: str):
              value = raw_value or ""
              if not (8 <= len(value) <= 128):
                  raise ValueError("DB password must be 8-128 characters long.")
              invalid = sorted({ch for ch in value if ch in {'/', '@', '"', ' '} or not (33 <= ord(ch) <= 126)})
              if invalid:
                  printable = ", ".join(repr(ch) for ch in invalid)
                  raise ValueError(f"DB password contains invalid characters for RDS SQL Server: {printable}")

          db_password = os.environ["DEV_DB_PASSWORD"]
          validate_db_password(db_password)

          data = {
              "aws_region": os.environ["AWS_REGION"],
              "project_name": (os.environ.get("DB_PROJECT_NAME") or "hospital-mgmt").strip(),
              "vpc_id": os.environ["RESOLVED_VPC_ID"],
              "private_subnet_ids": parse_json_list(os.environ.get("RESOLVED_PRIVATE_SUBNET_IDS"), []),
              "allowed_cidr_blocks": parse_json_list(os.environ.get("DEV_DB_ALLOWED_CIDRS"), ["10.20.0.0/16"]),
              "db_username": (os.environ.get("DEV_DB_USERNAME") or "adminuser").strip(),
              "db_password": db_password,
          }

          Path("github.auto.tfvars.json").write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          DB_PROJECT_NAME: ${{ env.DB_PROJECT_NAME }}
          DEV_DB_ALLOWED_CIDRS: ${{ env.DEV_DB_ALLOWED_CIDRS }}
          DEV_DB_USERNAME: ${{ env.DEV_DB_USERNAME }}
          DEV_DB_PASSWORD: ${{ env.DEV_DB_PASSWORD }}
          RESOLVED_VPC_ID: ${{ steps.resolve_network.outputs.vpc_id }}
          RESOLVED_PRIVATE_SUBNET_IDS: ${{ steps.resolve_network.outputs.private_subnet_ids }}

      - name: Terraform init (dev-database)
        working-directory: terraform/environments/dev-database
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: hospital-mgmt/dev-database/terraform.tfstate
        run: |
          if [ -n "$TF_STATE_BUCKET" ] && [ -n "$TF_LOCK_TABLE" ]; then
            terraform init \
              -backend-config="bucket=$TF_STATE_BUCKET" \
              -backend-config="key=$TF_STATE_KEY" \
              -backend-config="region=${{ env.AWS_REGION }}" \
              -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Terraform plan (dev-database)
        working-directory: terraform/environments/dev-database
        run: terraform plan

      - name: Terraform apply (dev-database)
        working-directory: terraform/environments/dev-database
        run: terraform apply -auto-approve

      - name: Show database outputs
        working-directory: terraform/environments/dev-database
        run: terraform output

      - name: Capture handoff values
        id: handoff
        shell: bash
        working-directory: terraform/environments/dev-database
        run: |
          set -euo pipefail
          ENDPOINT="$(terraform output -raw sqlserver_endpoint)"
          PORT="$(terraform output -raw sqlserver_port)"
          IDENTIFIER="$(terraform output -raw sqlserver_identifier)"

          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"

      - name: Publish hm-database handoff summary
        shell: bash
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Dev Database Handoff

          Terraform successfully applied the dev SQL Server stack.

          - RDS Identifier: ${{ steps.handoff.outputs.identifier }}
          - Endpoint: ${{ steps.handoff.outputs.endpoint }}
          - Port: ${{ steps.handoff.outputs.port }}
          - Username: ${{ env.DEV_DB_USERNAME || 'adminuser' }}

          Update hm-database repository environment **dev** secrets with:

          - DB_SERVER = ${{ steps.handoff.outputs.endpoint }},${{ steps.handoff.outputs.port }}
          - DB_USERNAME = ${{ env.DEV_DB_USERNAME || 'adminuser' }}
          - DB_PASSWORD = (same value as DEV_DB_PASSWORD secret from this repo)
          EOF

          echo "::notice title=hm-database handoff::Use endpoint ${{ steps.handoff.outputs.endpoint }}:${{ steps.handoff.outputs.port }} in hm-database dev secrets."
