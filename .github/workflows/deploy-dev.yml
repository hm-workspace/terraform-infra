name: Deploy Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy to dev (default: dev-latest).'
        required: false
        default: 'dev-latest'
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform-apply-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image tag
        id: resolve_tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          echo "tag=${TAG:-dev-latest}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: terraform/environments/dev
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: hospital-mgmt/dev/terraform.tfstate
        run: |
          if [ -n "$TF_STATE_BUCKET" ] && [ -n "$TF_LOCK_TABLE" ]; then
            terraform init \
              -backend-config="bucket=$TF_STATE_BUCKET" \
              -backend-config="key=$TF_STATE_KEY" \
              -backend-config="region=${{ env.AWS_REGION }}" \
              -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Terraform plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="image_tag=${{ steps.resolve_tag.outputs.tag }}"

      - name: Terraform apply (dev)
        working-directory: terraform/environments/dev
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="image_tag=${{ steps.resolve_tag.outputs.tag }}"
