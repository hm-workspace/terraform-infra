name: Deploy Dev

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform-apply-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image tag
        id: resolve_tag
        shell: bash
        run: |
          TAG="${{ vars.DEV_IMAGE_TAG }}"
          TAG="${TAG:-dev-latest}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate image tag format
        shell: bash
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image tag: $TAG"
            echo "Tag must match: ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$"
            exit 1
          fi

      - name: Terraform init
        working-directory: terraform/environments/dev
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: hospital-mgmt/dev/terraform.tfstate
        run: |
          if [ -n "$TF_STATE_BUCKET" ] && [ -n "$TF_LOCK_TABLE" ]; then
            terraform init \
              -backend-config="bucket=$TF_STATE_BUCKET" \
              -backend-config="key=$TF_STATE_KEY" \
              -backend-config="region=${{ env.AWS_REGION }}" \
              -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Terraform plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="image_tag=${{ steps.resolve_tag.outputs.tag }}"

      - name: Terraform apply (dev)
        working-directory: terraform/environments/dev
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="image_tag=${{ steps.resolve_tag.outputs.tag }}"
