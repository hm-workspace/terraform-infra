name: Deploy Prod

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to tag name when triggered by git tag)."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  terraform-apply-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deploy image tag
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform init
        working-directory: infra/terraform/environments/prod
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: hospital-mgmt/prod/terraform.tfstate
        run: |
          if [ -n "$TF_STATE_BUCKET" ] && [ -n "$TF_LOCK_TABLE" ]; then
            terraform init \
              -backend-config="bucket=$TF_STATE_BUCKET" \
              -backend-config="key=$TF_STATE_KEY" \
              -backend-config="region=${{ env.AWS_REGION }}" \
              -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
              -backend-config="encrypt=true"
          else
            terraform init
          fi

      - name: Terraform apply (prod)
        working-directory: infra/terraform/environments/prod
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="image_tag=${{ steps.resolve_tag.outputs.tag }}"
