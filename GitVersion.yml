mode: ContinuousDelivery
next-version: 1.0.0
branches:
  main:
    regex: ^main$
    increment: Patch
    is-main-branch: true
  develop:
    regex: ^develop$
    increment: Minor
    label: beta
  feature:
    regex: ^features?[/-]
    increment: Inherit
    label: alpha
  hotfix:
    regex: ^hotfix(es)?[/-]
    increment: Patch
    label: hotfix
  release:
    regex: ^releases?[/-]
    increment: Patch
    label: rc
ignore:
  sha: []
